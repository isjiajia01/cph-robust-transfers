name: Week3 Docs Update

on:
  workflow_dispatch:
  schedule:
    - cron: "40 1 * * *"

concurrency:
  group: week3-docs-update
  cancel-in-progress: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      REPORT_BUCKET: ${{ secrets.WEEK3_REPORT_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update docs from latest summary
        run: |
          test -n "$REPORT_BUCKET"
          chmod +x infra/docs/task_b_update_repo_docs.sh
          bash infra/docs/task_b_update_repo_docs.sh "$REPORT_BUCKET"

      - name: Commit and push
        run: |
          if git diff --quiet docs/week3_summary.md; then
            echo "No doc changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/week3_summary.md
          git commit -m "docs: refresh week3 summary from latest report"
          git push
